                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, count: item.count + 1 } : item);
                    }
                    return [...prev, { ...product, count: 1 }];
                });
            };

            const removeFromCart = (productId) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === productId);
                    if (!existing) return prev;
                    if (existing.count === 1) {
                        return prev.filter(item => item.id !== productId);
                    }
                    return prev.map(item => item.id === productId ? { ...item, count: item.count - 1 } : item);
                });
            };

                return item ? item.count : 0;

                                <span className="bg-white p-2 rounded-xl shadow-inner flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-orange-600">
                                        <path d="M11.996 2.25a.75.75 0 0 1 .75.75v1.272a5.253 5.253 0 0 1 4.542 4.195 4.5 4.5 0 0 1 1.712 3.533c0 1.942-1.229 3.597-2.94 4.218l.04.482a2.25 2.25 0 0 1-2.242 2.437H10.14a2.25 2.25 0 0 1-2.242-2.437l.04-.482c-1.711-.62-2.94-2.276-2.94-4.218a4.5 4.5 0 0 1 1.712-3.533 5.253 5.253 0 0 1 4.532-4.194V3a.75.75 0 0 1 .755-.75ZM18 12a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3c0 .878.379 1.667 1 2.22A4.47 4.47 0 0 1 9.4 15h5.2c1.01 0 1.944-.336 2.7-1.12.338-.344.7-.72.7-1.66ZM9.398 16.5a5.955 5.955 0 0 0-1.558.83l-.04.482a.75.75 0 0 0 .747.813h6.906a.75.75 0 0 0 .747-.813l-.04-.482a5.955 5.955 0 0 0-1.558-.83H9.398Z" />
                                    </svg>
                                </span>
                                <span>CRUNCH.GO</span>
                            </h1>
                            <div className="flex items-center gap-4">
                                <span className="hidden md:inline-block text-xs font-semibold bg-orange-700/40 px-3 py-1.5 rounded-full backdrop-blur-sm">
                                    🚀 Быстрая доставка из ресторанов и дарксторов
                                </span>
                                <a href="#cart" className="bg-white text-orange-600 font-bold px-5 py-2.5 rounded-xl flex items-center gap-2 shadow-md hover:bg-orange-50 active:scale-95 transition-all text-sm">
                                    <span>Корзина</span>
                                    {totalItems > 0 && (
                                        <span className="bg-orange-600 text-white text-xs px-2 py-0.5 rounded-md">
                                            {totalItems}
                                        </span>
                                    )}
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* ГЛАВНЫЙ КОНТЕНТ */}
                    <main className="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        {/* ЛЕНТА ТОВАРОВ И КАТЕГОРИЙ */}
                        <div className="lg:col-span-2 space-y-8">
                            
                            {/* СЕТ ДНЯ */}
                            <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-2 group hover:shadow-md transition-shadow">
                                <div className="relative h-56 md:h-full min-h-[220px]">
                                    <img src={SET_OF_THE_DAY.image} alt={SET_OF_THE_DAY.name} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    <div className="absolute top-3 left-3 bg-orange-500 text-white text-xs font-black px-3 py-1.5 rounded-lg uppercase tracking-wide shadow-md">
                                        🔥 Сет Дня
                                    </div>
                                </div>
                                <div className="p-6 flex flex-col justify-between space-y-4 bg-gradient-to-br from-white to-orange-50/20">
                                    <div className="space-y-2">
                                        <h3 className="text-2xl font-extrabold tracking-tight text-gray-900">{SET_OF_THE_DAY.name}</h3>
                                        <p className="text-sm text-gray-500 leading-relaxed">{SET_OF_THE_DAY.desc}</p>
                                    </div>
                                    <div className="flex items-center justify-between pt-2 border-t border-gray-100">
                                        <div>
                                            <span className="text-xs text-gray-400 line-through block">{SET_OF_THE_DAY.oldPrice} ₽</span>
                                            <span className="text-2xl font-black text-orange-600">{SET_OF_THE_DAY.price} ₽</span>
                                        </div>
                                        {getProductCount(SET_OF_THE_DAY.id) === 0 ? (
                                            <button onClick={() => addToCart(SET_OF_THE_DAY)} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-2.5 rounded-xl shadow-md transition-all active:scale-95 cursor-pointer text-sm">
                                                Добавить
                                            </button>
                                        ) : (
                                            <div className="flex items-center bg-orange-100 text-orange-600 rounded-xl font-bold border border-orange-200 p-1">
                                                <button onClick={() => removeFromCart(SET_OF_THE_DAY.id)} className="px-3 py-1 text-lg hover:bg-white rounded-lg transition-colors">-</button>
                                                <span className="px-3 text-sm">{getProductCount(SET_OF_THE_DAY.id)}</span>
                                                <button onClick={() => addToCart(SET_OF_THE_DAY)} className="px-3 py-1 text-lg hover:bg-white rounded-lg transition-colors">+</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* СЕЛЕКТОР КАТЕГОРИЙ */}
                            <div className="flex gap-2 overflow-x-auto pb-3 scrollbar-none sticky top-[72px] bg-gray-50 py-2 z-40">
                                {categories.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setActiveCategory(cat)}
                                        className={`px-5 py-2.5 rounded-xl font-semibold text-sm whitespace-nowrap transition-all cursor-pointer ${
                                            activeCategory === cat 
                                                ? 'bg-orange-500 text-white shadow-md shadow-orange-100' 
                                                : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200/60'
                                        }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {/* СЕТКА ТОВАРОВ */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                {filteredProducts.map(product => {
                                    const count = getProductCount(product.id);
                                    return (
                                        <div key={product.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition-shadow group">
                                            <div className="relative h-44 overflow-hidden bg-gray-100">
                                                <img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-103 transition-transform duration-300" />
                                                <span className="absolute bottom-2 right-2 bg-white/90 backdrop-blur-sm text-[10px] font-bold px-2 py-0.5 rounded-md text-gray-500">
                                                    {product.category}
                                                </span>
                                            </div>
                                            <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                <div className="space-y-1">
                                                    <h4 className="font-bold text-gray-900 group-hover:text-orange-600 transition-colors">{product.name}</h4>
                                                    <p className="text-xs text-gray-400 line-clamp-2 leading-relaxed">{product.desc}</p>
                                                </div>
                                                <div className="flex justify-between items-center pt-2 border-t border-gray-50">
                                                    <span className="font-extrabold text-lg text-gray-950">{product.price} ₽</span>
                                                    
                                                    {count === 0 ? (
                                                        <button 
                                                            onClick={() => addToCart(product)}
                                                            {/* Исправлено: теперь строго "В корзину" на русском языке */}
                                                            className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-4 py-2 rounded-xl text-xs transition-colors cursor-pointer"
                                                        >
                                                            В корзину +
                                                        </button>
                                                    ) : (
                                                        <div className="flex items-center bg-orange-55 text-orange-600 rounded-xl font-bold border border-orange-200 p-0.5">
                                                            <button onClick={() => removeFromCart(product.id)} className="px-2.5 py-1 text-sm hover:bg-white rounded-lg transition-colors">-</button>
                                                            <span className="px-2 text-xs">{count}</span>
                                                            <button onClick={() => addToCart(product)} className="px-2.5 py-1 text-sm hover:bg-white rounded-lg transition-colors">+</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* БОКОВАЯ КОРЗИНА И ОФОРМЛЕНИЕ */}
                        <div id="cart" className="lg:col-span-1">
                            <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 sticky top-24 space-y-6">
                                <h3 className="text-lg font-black text-gray-900 border-b pb-4 flex justify-between items-center">
                                    <span>Корзина</span>
                                    <span className="text-xs bg-gray-100 text-gray-500 px-2.5 py-1 rounded-md font-normal">{totalItems} шт.</span>
                                </h3>

                                {cart.length === 0 ? (
                                    <div className="text-center py-12 text-gray-400 space-y-3">
                                        <div className="text-4xl">🛒</div>
                                        <p className="text-xs leading-relaxed">Внутри пока пусто.<br/>Выбирайте категории выше и добавляйте товары!</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4 max-h-72 overflow-y-auto pr-1 scrollbar-none">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex justify-between items-center text-xs gap-3">
                                                <img src={item.image} className="w-10 h-10 object-cover rounded-lg bg-gray-50" />
                                                <div className="flex-1 min-w-0">
                                                    <div className="font-bold text-gray-800 truncate">{item.name}</div>
                                                    <div className="text-gray-400 mt-0.5">{item.price} ₽ × {item.count}</div>
                                                </div>
                                                <div className="flex items-center bg-gray-100 rounded-lg p-0.5 shrink-0">
                                                    <button onClick={() => removeFromCart(item.id)} className="px-1.5 py-0.5 text-gray-500 hover:bg-white rounded-md font-bold">-</button>
                                                    <span className="px-1.5 font-mono font-bold text-[11px]">{item.count}</span>
                                                    <button onClick={() => addToCart(item)} className="px-1.5 py-0.5 text-gray-500 hover:bg-white rounded-md font-bold">+</button>
                                                </div>
                                                <div className="w-16 text-right font-extrabold text-gray-900 shrink-0">
                                                    {item.price * item.count} ₽
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* ИНФОРМАЦИЯ О СТОИМОСТИ ДОСТАВКИ */}
                                {subTotal > 0 && (
                                    <div className="bg-orange-50 rounded-2xl p-3 border border-orange-100 text-[11px] text-orange-800 leading-normal">
                                        <div className="font-bold mb-1">📊 Динамическая доставка:</div>
                                        <div>• Заказ до 500 ₽ → <span className="font-bold">250 ₽</span></div>
                                        <div>• Заказ от 500 ₽ → <span className="font-bold">150 ₽</span></div>
                                        <div>• Заказ от 1000 ₽ → <span className="font-bold text-green-600">Бесплатно!</span></div>
                                        {subTotal < 1000 && (
                                            <div className="mt-2 text-gray-600 border-t border-orange-200/50 pt-1.5">
                                                Добавь товаров еще на <span className="font-bold text-orange-600">{1000 - subTotal} ₽</span> для бесплатной доставки.
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* ПРОМОКОД */}
                                <div className="pt-4 border-t border-gray-100">
                                    <label className="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-2">Промокод на скидку</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type="text" 
                                            value={promoCode}
                                            onChange={(e) => setPromoCode(e.target.value)}
                                            placeholder="Код: CRUNCH20" 
                                            className="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs flex-1 focus:outline-none focus:border-orange-400 uppercase font-mono font-bold tracking-wide"
                                        />
                                        <button onClick={handleApplyPromo} className="bg-gray-900 hover:bg-gray-950 text-white font-bold px-4 py-2 rounded-xl text-xs transition-colors cursor-pointer">
                                            Ок
                                        </button>
                                    </div>
                                    {promoError && <p className="text-[11px] text-red-500 mt-1.5 font-medium">❌ {promoError}</p>}
                                    {promoSuccess && <p className="text-[11px] text-green-600 mt-1.5 font-medium">✓ {promoSuccess}</p>}
                                </div>

                                {/* ЧЕК / ИТОГО */}
                                <div className="bg-gray-50/80 rounded-2xl p-4 space-y-2.5 text-xs font-semibold text-gray-500">
                                    <div className="flex justify-between">
                                        <span>Товары:</span>
                                        <span className="text-gray-900">{subTotal} ₽</span>
                                    </div>
                                    {discount > 0 && (
                                        <div className="flex justify-between text-green-600">
                                            <span>Скидка ({discount}%):</span>
                                            <span>-{discountAmount} ₽</span>
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center">
                                        <span>Доставка:</span>
                                        <span className={`font-bold ${deliveryPrice === 0 && subTotal > 0 ? 'text-green-600' : 'text-gray-900'}`}>
                                            {subTotal === 0 ? '0 ₽' : deliveryPrice === 0 ? 'Бесплатно' : `${deliveryPrice} ₽`}
                                        </span>
                                    </div>
                                    <div className="flex justify-between text-base font-black text-gray-900 pt-3 border-t border-dashed border-gray-200">
                                        <span>К оплате:</span>
                                        <span className="text-orange-600 text-lg">{finalTotal} ₽</span>
                                    </div>
                                </div>

                                {/* ОФОРМЛЕНИЕ */}
                                <button 
                                    onClick={() => cart.length > 0 ? alert('Заказ оформлен! Еда уже готовится 🚀') : alert('Добавьте товары в корзину!')}
                                    className={`w-full font-bold py-4 rounded-xl shadow-lg transition-all text-center text-sm text-white cursor-pointer ${
                                        cart.length > 0 
                                            ? 'bg-orange-500 hover:bg-orange-600 shadow-orange-100 hover:translate-y-[-1px]' 
                                            : 'bg-gray-300 shadow-none cursor-not-allowed'
                                    }`}
                                >
                                    Заказать доставку 🚀
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
