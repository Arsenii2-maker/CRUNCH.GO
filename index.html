            { id: 208, badge: '🍰 Сладкий Финал', name: 'Десерт Трио', oldPrice: 760, price: 520, image: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?auto=format&fit=crop&w=800&q=80', desc: 'Чизкейк Нью-Йорк + Тирамису + Штрудель яблочный. Три десерта по цене двух!' },
            { id: 209, badge: '👨‍👩‍👧‍👦 Семейное', name: 'Ужин для всей семьи', oldPrice: 2890, price: 1990, image: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80', desc: '2 пиццы + 4 бургера + 2 порции фри + 4 напитка. Хватит на всех!' }
        ];

        // ==================== КАСТОМИЗАЦИЯ ====================
        const CUSTOM_CONFIGS = {
            burgers: {
                removable: ['Лук', 'Томаты', 'Фирменный соус'],
                addable: [
                    { name: 'Экстра Сыр Чеддер', price: 60 },
                    { name: 'Хрустящий Бекон', price: 80 },
                    { name: 'Острый Халапеньо', price: 40 }
                ]
            },
            pizza: {
                removable: ['Томаты', 'Итальянские травы'],
                addable: [
                    { name: 'Сырный бортик', price: 120 },
                    { name: 'Двойная Пепперони', price: 90 },
                    { name: 'Грибы шампиньоны', price: 50 }
                ]
            },
            sushi: {
                removable: ['Имбирь', 'Васаби'],
                addable: [
                    { name: 'Дополнительный Лосось', price: 140 },
                    { name: 'Крем-сыр Hochland', price: 60 },
                    { name: 'Соус Унаги', price: 30 }
                ]
            },
            soups: {
                removable: ['Кинза', 'Лук-порей'],
                addable: [
                    { name: 'Тигровые креветки (3 шт)', price: 150 },
                    { name: 'Хрустящие сухарики', price: 30 },
                    { name: 'Дополнительный рис', price: 40 }
                ]
            },
            salads: {
                removable: ['Сухарики', 'Соус', 'Лук'],
                addable: [
                    { name: 'Дополнительная курица', price: 120 },
                    { name: 'Авокадо', price: 90 },
                    { name: 'Сыр пармезан', price: 70 }
                ]
            }
        };

        function App() {
            const [cart, setCart] = useState([]);
            const [activeCategory, setActiveCategory] = useState('Все');
            const [promoCode, setPromoCode] = useState('');
            const [discount, setDiscount] = useState(0);
            const [promoError, setPromoError] = useState('');
            const [promoSuccess, setPromoSuccess] = useState('');
            const [currentSlide, setCurrentSlide] = useState(0);
            const [touchStart, setTouchStart] = useState(0);
            const [touchEnd, setTouchEnd] = useState(0);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [removedItems, setRemovedItems] = useState([]);
            const [addedItems, setAddedItems] = useState([]);
            const [activeReceipt, setActiveReceipt] = useState(null);
            const [searchOpen, setSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const searchInputRef = useRef(null);

            // 10 категорий + "Все" | Салаты теперь после Супов
            const categories = ['Все', 'Бургеры', 'Пицца', 'Суши', 'Супы', 'Салаты', 'Закуски', 'Комбо', 'Продукты', 'Выпечка', 'Напитки'];

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % PROMOTIONS.length);
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (searchOpen && searchInputRef.current) {
                    setTimeout(() => searchInputRef.current.focus(), 50);
                }
            }, [searchOpen]);

            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        setSearchOpen(false);
                        setSearchQuery('');
                    }
                };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            const handleTouchStart = (e) => { setTouchStart(e.targetTouches[0].clientX); };
            const handleTouchMove = (e) => { setTouchEnd(e.targetTouches[0].clientX); };
            const handleTouchEnd = () => {
                if (touchStart - touchEnd > 50) setCurrentSlide((prev) => (prev + 1) % PROMOTIONS.length);
                if (touchStart - touchEnd < -50) setCurrentSlide((prev) => (prev - 1 + PROMOTIONS.length) % PROMOTIONS.length);
            };

            const openProductModal = (product) => {
                if (!product.configType) return;
                setSelectedProduct(product);
                setRemovedItems([]);
                setAddedItems([]);
            };

            const addToCartSimple = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id && !item.customKey);
                    if (existing) return prev.map(item => (item.id === product.id && !item.customKey) ? { ...item, count: item.count + 1 } : item);
                    return [...prev, { ...product, count: 1, added: [], removed: [], customKey: null }];
                });
            };

            const removeFromCartSimple = (productId) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === productId && !item.customKey);
                    if (!existing) return prev;
                    if (existing.count === 1) return prev.filter(item => !(item.id === productId && !item.customKey));
                    return prev.map(item => (item.id === productId && !item.customKey) ? { ...item, count: item.count - 1 } : item);
                });
            };

            const getProductCountInCart = (productId) => {
                const item = cart.find(i => i.id === productId && !i.customKey);
                return item ? item.count : 0;
            };

            const handleAddToCartCustomized = () => {
                const extraCost = addedItems.reduce((sum, item) => sum + item.price, 0);
                const finalItemPrice = selectedProduct.price + extraCost;
                if (removedItems.length === 0 && addedItems.length === 0) {
                    addToCartSimple(selectedProduct);
                    setSelectedProduct(null);
                    return;
                }
                const customKey = selectedProduct.id + '-' + removedItems.join(',') + '-' + addedItems.map(i => i.name).join(',');
                setCart(prev => {
                    const existing = prev.find(item => item.customKey === customKey);
                    if (existing) return prev.map(item => item.customKey === customKey ? { ...item, count: item.count + 1 } : item);
                    return [...prev, { ...selectedProduct, price: finalItemPrice, basePrice: selectedProduct.price, count: 1, removed: [...removedItems], added: [...addedItems], customKey }];
                });
                setSelectedProduct(null);
            };

            const removeFromCartByKey = (uniqueKey, isCustom = false) => {
                setCart(prev => {
                    const existing = prev.find(item => isCustom ? item.customKey === uniqueKey : (item.id === uniqueKey && !item.customKey));
                    if (!existing) return prev;
                    if (existing.count === 1) return prev.filter(item => isCustom ? item.customKey !== uniqueKey : (item.id !== uniqueKey || item.customKey));
                    return prev.map(item => {
                        if (isCustom && item.customKey === uniqueKey) return { ...item, count: item.count - 1 };
                        if (!isCustom && item.id === uniqueKey && !item.customKey) return { ...item, count: item.count - 1 };
                        return item;
                    });
                });
            };

            const addMoreFromCart = (item) => {
                setCart(prev => prev.map(i => {
                    if (item.customKey && i.customKey === item.customKey) return { ...i, count: i.count + 1 };
                    if (!item.customKey && i.id === item.id && !i.customKey) return { ...i, count: i.count + 1 };
                    return i;
                }));
            };

            const searchResults = searchQuery.trim().length > 0
                ? PRODUCTS.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.desc.toLowerCase().includes(searchQuery.toLowerCase()))
                : [];

            const handleSearchSelect = (product) => {
                addToCartSimple(product);
                setSearchOpen(false);
                setSearchQuery('');
            };

            const totalItems = cart.reduce((sum, item) => sum + item.count, 0);
            const subTotal = cart.reduce((sum, item) => sum + (item.price * item.count), 0);
            let deliveryPrice = subTotal > 0 ? (subTotal >= 1000 ? 0 : (subTotal >= 500 ? 150 : 250)) : 0;
            const discountAmount = Math.round(subTotal * (discount / 100));
            const finalTotal = subTotal - discountAmount + deliveryPrice;

            const handleApplyPromo = () => {
                if (promoCode.trim().toUpperCase() === 'CRUNCH20') {
                    setDiscount(20); setPromoSuccess('Промокод применен! -20% 🔥'); setPromoError('');
                } else {
                    setPromoError('Неверный код. Попробуйте CRUNCH20'); setPromoSuccess(''); setDiscount(0);
                }
            };

            const handleCheckout = () => {
                if (cart.length === 0) return;
                const receiptNo = Math.floor(100000 + Math.random() * 900000);
                const currentDateTime = new Date().toLocaleString('ru-RU');
                setActiveReceipt({ receiptNo, dateTime: currentDateTime, items: [...cart], subTotal, discount, discountAmount, deliveryPrice, finalTotal });
                setCart([]);
            };

            const downloadReceiptFile = () => {
                if (!activeReceipt) return;
                let text = '========================================\n   CRUNCH.GO RECEIPT\n========================================\n';
                text += 'Кассовый чек №: ' + activeReceipt.receiptNo + '\nДата и время: ' + activeReceipt.dateTime + '\n----------------------------------------\n\n';
                activeReceipt.items.forEach(function(item, index) {
                    text += (index + 1) + '. ' + item.name + ' x ' + item.count + '\n';
                    if (item.removed && item.removed.length > 0) text += ' [Убрано]: ' + item.removed.join(', ') + '\n';
                    if (item.added && item.added.length > 0) text += ' [Добавлено]: ' + item.added.map(function(i) { return i.name; }).join(', ') + '\n';
                    text += ' Цена: ' + (item.price * item.count) + ' руб.\n\n';
                });
                text += '----------------------------------------\nСумма позиций: ' + activeReceipt.subTotal + ' руб.\n';
                if (activeReceipt.discount > 0) text += 'Скидка (' + activeReceipt.discount + '%): -' + activeReceipt.discountAmount + ' руб.\n';
                text += 'Доставка: ' + (activeReceipt.deliveryPrice === 0 ? 'БЕСПЛАТНО' : activeReceipt.deliveryPrice + ' руб.') + '\n';
                text += '========================================\nИТОГО К ОПЛАТЕ: ' + activeReceipt.finalTotal + ' РУБ.\n========================================\n';
                var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = url; link.download = 'CrunchGo_Receipt_' + activeReceipt.receiptNo + '.txt';
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const filteredProducts = activeCategory === 'Все' ? PRODUCTS : PRODUCTS.filter(function(p) { return p.category === activeCategory; });
            const currentConfig = selectedProduct && selectedProduct.configType ? CUSTOM_CONFIGS[selectedProduct.configType] : { removable: [], addable: [] };

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    {/* ХЕДЕР — название всегда видно */}
                    <header className="bg-gradient-to-r from-orange-500 to-orange-600 text-white sticky top-0 z-50 shadow-lg">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center gap-3">
                            <h1 onClick={function() { setActiveReceipt(null); }} className="text-xl sm:text-2xl font-black tracking-tighter flex items-center gap-2 cursor-pointer shrink-0">
                                <span className="bg-white p-2 rounded-xl shadow-inner flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 sm:w-6 sm:h-6 text-orange-600"><path d="M11.996 2.25a.75.75 0 0 1 .75.75v1.272a5.253 5.253 0 0 1 4.542 4.195 4.5 4.5 0 0 1 1.712 3.533c0 1.942-1.229 3.597-2.94 4.218l.04.482a2.25 2.25 0 0 1-2.242 2.437H10.14a2.25 2.25 0 0 1-2.242-2.437l.04-.482c-1.711-.62-2.94-2.276-2.94-4.218a4.5 4.5 0 0 1 1.712-3.533 5.253 5.253 0 0 1 4.532-4.194V3a.75.75 0 0 1 .755-.75ZM18 12a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3c0 .878.379 1.667 1 2.22A4.47 4.47 0 0 1 9.4 15h5.2c1.01 0 1.944-.336 2.7-1.12.338-.344.7-.72.7-1.66ZM9.398 16.5a5.955 5.955 0 0 0-1.558.83l-.04.482a.75.75 0 0 0 .747.813h6.906a.75.75 0 0 0 .747-.813l-.04-.482a5.955 5.955 0 0 0-1.558-.83H9.398Z" /></svg>
                                </span>
                                <span>CRUNCH.GO</span>
                            </h1>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setSearchOpen(true)} className="bg-white/20 hover:bg-white/30 text-white font-bold p-2.5 rounded-xl transition-all cursor-pointer" title="Поиск блюд">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path fillRule="evenodd" d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z" clipRule="evenodd" /></svg>
                                </button>
                                <a href="#cart" className="bg-white text-orange-600 font-bold px-4 sm:px-5 py-2.5 rounded-xl flex items-center gap-2 shadow-md hover:bg-orange-50 transition-all text-sm">
                                    <span>Корзина</span>
                                    {totalItems > 0 && <span className="bg-orange-600 text-white text-xs px-2 py-0.5 rounded-md">{totalItems}</span>}
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* МОДАЛКА ПОИСКА */}
                    {searchOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-start justify-center p-4 pt-20" onClick={() => { setSearchOpen(false); setSearchQuery(''); }}>
                            <div className="bg-white rounded-3xl max-w-2xl w-full max-h-[75vh] shadow-2xl flex flex-col animate-search" onClick={(e) => e.stopPropagation()}>
                                <div className="p-5 border-b border-gray-100 flex items-center gap-3 shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 text-gray-400 shrink-0"><path fillRule="evenodd" d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z" clipRule="evenodd" /></svg>
                                    <input ref={searchInputRef} type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Введите название блюда..." className="flex-1 bg-transparent outline-none text-base font-medium placeholder-gray-400" />
                                    <button onClick={() => { setSearchOpen(false); setSearchQuery(''); }} className="text-gray-400 hover:text-gray-700 font-bold p-1.5 rounded-lg hover:bg-gray-100 transition-all cursor-pointer">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path fillRule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clipRule="evenodd" /></svg>
                                    </button>
                                </div>
                                <div className="overflow-y-auto p-3 scrollbar-none flex-1">
                                    {searchQuery.trim().length === 0 ? (
                                        <div className="text-center py-10 text-gray-400 text-xs"><div className="text-4xl mb-2">🔍</div>Начните вводить название блюда</div>
                                    ) : searchResults.length === 0 ? (
                                        <div className="text-center py-10 text-gray-400 text-xs"><div className="text-4xl mb-2">😕</div>По запросу "{searchQuery}" ничего не найдено</div>
                                    ) : (
                                        <div className="space-y-1">
                                            {searchResults.map(product => {
                                                const countInCart = getProductCountInCart(product.id);
                                                return (
                                                    <div key={product.id} className="flex items-center gap-3 p-2.5 rounded-xl hover:bg-orange-50 transition-all cursor-pointer group" onClick={() => handleSearchSelect(product)}>
                                                        <img src={product.image} alt={product.name} className="w-14 h-14 object-cover rounded-lg bg-gray-100 shrink-0" />
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-bold text-sm text-gray-900 truncate">{product.name}</div>
                                                            <div className="text-[11px] text-gray-400 truncate">{product.desc}</div>
                                                            <div className="text-xs font-black text-orange-600 mt-0.5">{product.price} ₽ · {product.category}</div>
                                                        </div>
                                                        <div className="shrink-0 flex items-center gap-2">
                                                            {countInCart > 0 && <span className="text-[10px] bg-orange-100 text-orange-600 font-bold px-2 py-0.5 rounded-md">{countInCart} в корзине</span>}
                                                            <button className="bg-orange-500 group-hover:bg-orange-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-all">+ Добавить</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeReceipt ? (
                        <div className="max-w-md mx-auto px-4 mt-12 animate-receipt">
                            <div className="bg-white rounded-3xl shadow-xl p-8 border border-gray-200 relative overflow-hidden bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
                                <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-orange-500 via-red-500 to-orange-500"></div>
                                <div className="text-center space-y-2 mt-4">
                                    <div className="text-3xl font-black tracking-tight text-gray-900">CRUNCH.GO</div>
                                    <p className="text-xs text-gray-400 uppercase font-bold tracking-wider">Кассовый чек №{activeReceipt.receiptNo}</p>
                                    <p className="text-[11px] text-gray-400">{activeReceipt.dateTime}</p>
                                </div>
                                <div className="border-b border-dashed border-gray-300 my-6"></div>
                                <div className="space-y-4">
                                    {activeReceipt.items.map(function(item, index) {
                                        return (
                                            <div key={index} className="text-xs flex justify-between items-start gap-4">
                                                <div className="space-y-0.5">
                                                    <span className="font-extrabold text-gray-900">{item.name}</span>
                                                    <span className="text-gray-400 block">{item.count} шт. × {item.price / item.count} ₽</span>
                                                    {item.removed && item.removed.length > 0 && <p className="text-[10px] text-red-500 font-medium">Без: {item.removed.join(', ')}</p>}
                                                    {item.added && item.added.length > 0 && <p className="text-[10px] text-green-600 font-medium">+ {item.added.map(function(i) { return i.name; }).join(', ')}</p>}
                                                </div>
                                                <span className="font-bold text-gray-900 whitespace-nowrap">{item.price * item.count} ₽</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="border-b border-dashed border-gray-300 my-6"></div>
                                <div className="space-y-2 text-xs font-semibold text-gray-500">
                                    <div className="flex justify-between"><span>Сумма:</span><span className="text-gray-900">{activeReceipt.subTotal} ₽</span></div>
                                    {activeReceipt.discount > 0 && <div className="flex justify-between text-green-600"><span>Скидка ({activeReceipt.discount}%):</span><span>-{activeReceipt.discountAmount} ₽</span></div>}
                                    <div className="flex justify-between"><span>Доставка:</span><span className="text-gray-900">{activeReceipt.deliveryPrice === 0 ? 'Бесплатно' : activeReceipt.deliveryPrice + ' ₽'}</span></div>
                                    <div className="flex justify-between text-base font-black text-gray-900 pt-4 border-t border-gray-200 mt-2"><span>ИТОГО К ОПЛАТЕ:</span><span className="text-orange-600 text-xl">{activeReceipt.finalTotal} ₽</span></div>
                                </div>
                                <div className="mt-8 space-y-3">
                                    <button onClick={downloadReceiptFile} className="w-full bg-gray-900 hover:bg-black text-white text-xs font-bold py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 cursor-pointer">📥 Сохранить чек</button>
                                    <button onClick={function() { setActiveReceipt(null); }} className="w-full bg-orange-50 hover:bg-orange-100 text-orange-600 text-xs font-bold py-3 rounded-xl transition-all text-center cursor-pointer">Вернуться в меню</button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <main className="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-8">
                                <div className="relative bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 select-none touch-pan-y min-h-[220px]" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                                    <div className="flex transition-transform duration-700 ease-in-out" style={{ transform: 'translateX(-' + (currentSlide * 100) + '%)' }}>
                                        {PROMOTIONS.map(function(promo) {
                                            return (
                                                <div key={promo.id} className="w-full shrink-0 flex flex-col md:grid md:grid-cols-2">
                                                    <div className="relative h-40 md:h-full min-h-[140px]">
                                                        <img src={promo.image} alt={promo.name} className="absolute inset-0 w-full h-full object-cover" />
                                                        <div className="absolute top-3 left-3 bg-orange-500 text-white text-[10px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wide z-10">{promo.badge}</div>
                                                    </div>
                                                    <div className="p-5 flex flex-col justify-between space-y-4 bg-gradient-to-br from-white to-orange-50/10 pb-8 md:pb-5">
                                                        <div><h3 className="text-lg font-black text-gray-900 leading-tight">{promo.name}</h3><p className="text-xs text-gray-400 mt-1 leading-relaxed">{promo.desc}</p></div>
                                                        <div className="flex items-center justify-between pt-2 border-t border-gray-100">
                                                            <div><span className="text-[10px] text-gray-400 line-through block">{promo.oldPrice} ₽</span><span className="text-xl font-black text-orange-600">{promo.price} ₽</span></div>
                                                            {getProductCountInCart(promo.id) > 0 ? (
                                                                <div className="flex items-center bg-orange-500 text-white rounded-xl p-0.5 shadow-sm">
                                                                    <button onClick={function() { removeFromCartSimple(promo.id); }} className="px-2.5 py-0.5 font-bold text-sm hover:bg-orange-600 rounded-lg cursor-pointer">-</button>
                                                                    <span className="px-2 font-bold text-xs min-w-[16px] text-center">{getProductCountInCart(promo.id)}</span>
                                                                    <button onClick={function() { addToCartSimple(promo); }} className="px-2.5 py-0.5 font-bold text-sm hover:bg-orange-600 rounded-lg cursor-pointer">+</button>
                                                                </div>
                                                            ) : (
                                                                <button onClick={function() { addToCartSimple(promo); }} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-4 py-2 rounded-xl text-xs shadow-md transition-all cursor-pointer">Добавить +</button>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="absolute bottom-3 left-1/2 transform -translate-x-1/2 flex gap-1.5 z-10">
                                        {PROMOTIONS.map(function(_, idx) { return (<button key={idx} onClick={function() { setCurrentSlide(idx); }} className={'h-1.5 rounded-full transition-all duration-300 ' + (currentSlide === idx ? 'w-4 bg-orange-500' : 'w-1.5 bg-gray-300')} />); })}
                                    </div>
                                </div>

                                <div className="flex gap-2 overflow-x-auto pb-3 scrollbar-none sticky top-[72px] bg-gray-50 py-2 z-40">
                                    {categories.map(function(cat) { return (<button key={cat} onClick={function() { setActiveCategory(cat); }} className={'px-5 py-2.5 rounded-xl font-semibold text-sm whitespace-nowrap transition-all cursor-pointer ' + (activeCategory === cat ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200/60')}>{cat}</button>); })}
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    {filteredProducts.map(function(product) {
                                        var countInCart = getProductCountInCart(product.id);
                                        return (
                                            <div key={product.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition-shadow group">
                                                <div className="relative h-44 overflow-hidden bg-gray-100">
                                                    <img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                                                    <span className="absolute bottom-2 right-2 bg-white/90 backdrop-blur-sm text-[10px] font-bold px-2 py-0.5 rounded-md text-gray-500">{product.category}</span>
                                                </div>
                                                <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                    <div className="space-y-1"><h4 className="font-bold text-gray-900">{product.name}</h4><p className="text-xs text-gray-400 line-clamp-2 leading-relaxed">{product.desc}</p></div>
                                                    <div className="flex justify-between items-center pt-2 border-t border-gray-50">
                                                        <span className="font-extrabold text-lg text-gray-950">{product.price} ₽</span>
                                                        <div className="flex items-center gap-1.5">
                                                            {countInCart > 0 ? (
                                                                <div className="flex items-center bg-orange-500 text-white rounded-xl p-0.5 select-none shadow-sm">
                                                                    <button onClick={function() { removeFromCartSimple(product.id); }} className="px-2.5 py-1 font-bold text-sm hover:bg-orange-600 rounded-lg cursor-pointer">-</button>
                                                                    <span className="px-2 font-mono font-bold text-xs min-w-[16px] text-center">{countInCart}</span>
                                                                    <button onClick={function() { addToCartSimple(product); }} className="px-2.5 py-1 font-bold text-sm hover:bg-orange-600 rounded-lg cursor-pointer">+</button>
                                                                </div>
                                                            ) : (
                                                                <button onClick={function() { addToCartSimple(product); }} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-4 py-2 rounded-xl text-xs shadow-sm transition-all cursor-pointer">Добавить +</button>
                                                            )}
                                                            {product.configType && (<button onClick={function() { openProductModal(product); }} className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold p-2 rounded-xl text-xs transition-all cursor-pointer" title="Настроить состав">⚙️</button>)}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div id="cart" className="lg:col-span-1">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 sticky top-24 space-y-6">
                                    <h3 className="text-lg font-black text-gray-900 border-b pb-4 flex justify-between items-center"><span>Корзина</span><span className="text-xs bg-gray-100 text-gray-500 px-2.5 py-1 rounded-md font-normal">{totalItems} шт.</span></h3>
                                    {cart.length === 0 ? (
                                        <div className="text-center py-12 text-gray-400 space-y-3"><div className="text-4xl">🛒</div><p className="text-xs leading-relaxed">Внутри пока пусто.<br/>Выбирайте товары для заказа.</p></div>
                                    ) : (
                                        <div className="space-y-4 max-h-72 overflow-y-auto pr-1 scrollbar-none">
                                            {cart.map(function(item, index) {
                                                return (
                                                    <div key={item.customKey || item.id + '-' + index} className="flex justify-between items-start text-xs gap-3 border-b border-gray-50 pb-3">
                                                        <img src={item.image} className="w-10 h-10 object-cover rounded-lg bg-gray-50 shrink-0" />
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-bold text-gray-800 truncate">{item.name}</div>
                                                            {item.removed && item.removed.length > 0 && <p className="text-[10px] text-red-400">Без: {item.removed.join(', ')}</p>}
                                                            {item.added && item.added.length > 0 && <p className="text-[10px] text-green-500">+ {item.added.map(function(i) { return i.name; }).join(', ')}</p>}
                                                            <div className="text-gray-400 mt-0.5">{item.price} ₽ × {item.count}</div>
                                                        </div>
                                                        <div className="flex items-center bg-gray-100 rounded-lg p-0.5 shrink-0 select-none">
                                                            <button onClick={function() { removeFromCartByKey(item.customKey || item.id, !!item.customKey); }} className="px-2 py-0.5 text-gray-600 hover:bg-white rounded-md font-bold text-sm transition-colors cursor-pointer">-</button>
                                                            <span className="px-2 font-mono font-bold text-[11px]">{item.count}</span>
                                                            <button onClick={function() { addMoreFromCart(item); }} className="px-2 py-0.5 text-gray-600 hover:bg-white rounded-md font-bold text-sm transition-colors cursor-pointer">+</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                    {subTotal > 0 && (<div className="bg-orange-50 rounded-2xl p-3 border border-orange-100 text-[11px] text-orange-800 leading-normal"><div className="font-bold mb-1">📊 Доставка:</div><div>• До 500 ₽ → <span className="font-bold">250 ₽</span></div><div>• От 500 ₽ → <span className="font-bold">150 ₽</span></div><div>• От 1000 ₽ → <span className="font-bold text-green-600">Бесплатно!</span></div></div>)}
                                    <div className="pt-2">
                                        <div className="flex gap-2"><input type="text" value={promoCode} onChange={function(e) { setPromoCode(e.target.value); }} placeholder="Код: CRUNCH20" className="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs flex-1 uppercase font-mono font-bold" /><button onClick={handleApplyPromo} className="bg-gray-900 text-white font-bold px-4 py-2 rounded-xl text-xs cursor-pointer">Ок</button></div>
                                        {promoError && <p className="text-[11px] text-red-500 mt-1.5">❌ {promoError}</p>}
                                        {promoSuccess && <p className="text-[11px] text-green-600 mt-1.5">✓ {promoSuccess}</p>}
                                    </div>
                                    <div className="bg-gray-50/80 rounded-2xl p-4 space-y-2.5 text-xs font-semibold text-gray-500">
                                        <div className="flex justify-between"><span>Сумма:</span><span className="text-gray-900">{subTotal} ₽</span></div>
                                        {discount > 0 && <div className="flex justify-between text-green-600"><span>Скидка ({discount}%):</span><span>-{discountAmount} ₽</span></div>}
                                        <div className="flex justify-between"><span>Доставка:</span><span className="text-gray-900">{subTotal === 0 ? '0 ₽' : deliveryPrice === 0 ? 'Бесплатно' : deliveryPrice + ' ₽'}</span></div>
                                        <div className="flex justify-between text-base font-black text-gray-900 pt-3 border-t border-dashed border-gray-200"><span>К оплате:</span><span className="text-orange-600 text-lg">{finalTotal} ₽</span></div>
                                    </div>
                                    <button onClick={handleCheckout} className={'w-full font-bold py-4 rounded-xl shadow-lg text-center text-sm text-white cursor-pointer transition-all ' + (cart.length > 0 ? 'bg-orange-500 hover:bg-orange-600 shadow-orange-100' : 'bg-gray-300 shadow-none cursor-not-allowed')} disabled={cart.length === 0}>Заказать доставку 🚀</button>
                                </div>
                            </div>
                        </main>
                    )}

                    {selectedProduct && selectedProduct.configType && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl border border-gray-100 flex flex-col">
                                <div className="relative h-64 bg-gray-100 shrink-0">
                                    <img src={selectedProduct.image} className="w-full h-full object-cover" />
                                    <button onClick={function() { setSelectedProduct(null); }} className="absolute top-4 right-4 bg-white/80 backdrop-blur-sm hover:bg-white text-gray-700 font-bold p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-md cursor-pointer">✕</button>
                                </div>
                                <div className="p-6 space-y-6 flex-1">
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-start gap-4"><h3 className="text-2xl font-black text-gray-900 leading-tight">{selectedProduct.name}</h3><span className="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap mt-1">{selectedProduct.ccal}</span></div>
                                        <p className="text-xs text-gray-500 leading-relaxed">{selectedProduct.desc}</p>
                                    </div>
                                    {currentConfig.removable && currentConfig.removable.length > 0 && (
                                        <div className="space-y-2"><h4 className="text-xs font-black text-gray-400 uppercase tracking-wider">Убрать из состава (Бесплатно)</h4><div className="flex flex-wrap gap-2">{currentConfig.removable.map(function(ing) { var isRemoved = removedItems.indexOf(ing) !== -1; return (<button key={ing} onClick={function() { if (removedItems.indexOf(ing) !== -1) setRemovedItems(removedItems.filter(function(i) { return i !== ing; })); else setRemovedItems([...removedItems, ing]); }} className={'px-3 py-2 rounded-xl text-xs font-semibold border transition-all cursor-pointer ' + (isRemoved ? 'border-red-500 bg-red-50 text-red-600' : 'border-gray-200 bg-white text-gray-700 hover:bg-gray-50')}>{isRemoved ? '✕ Без ' + ing.toLowerCase() : ing}</button>); })}</div></div>
                                    )}
                                    {currentConfig.addable && currentConfig.addable.length > 0 && (
                                        <div className="space-y-2"><h4 className="text-xs font-black text-gray-400 uppercase tracking-wider">Добавить в блюдо (За доплату)</h4><div className="grid grid-cols-1 sm:grid-cols-2 gap-2">{currentConfig.addable.map(function(ing) { var isAdded = addedItems.some(function(i) { return i.name === ing.name; }); return (<button key={ing.name} onClick={function() { if (addedItems.some(function(i) { return i.name === ing.name; })) setAddedItems(addedItems.filter(function(i) { return i.name !== ing.name; })); else setAddedItems([...addedItems, ing]); }} className={'px-3 py-2.5 rounded-xl text-xs font-bold border flex justify-between items-center transition-all cursor-pointer ' + (isAdded ? 'border-green-500 bg-green-50 text-green-600' : 'border-gray-200 bg-white text-gray-700 hover:bg-gray-50')}><span>{ing.name}</span><span className={isAdded ? 'text-green-600' : 'text-gray-400'}>+{ing.price} ₽</span></button>); })}</div></div>
                                    )}
                                    <div className="pt-4 border-t flex items-center justify-between gap-4">
                                        <div><span className="text-[10px] text-gray-400 block font-bold uppercase">Стоимость</span><span className="text-2xl font-black text-gray-900">{selectedProduct.price + addedItems.reduce(function(sum, i) { return sum + i.price; }, 0)} ₽</span></div>
                                        <button onClick={handleAddToCartCustomized} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-3.5 rounded-xl text-sm shadow-md transition-all active:scale-95 cursor-pointer">Применить настройки +</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
